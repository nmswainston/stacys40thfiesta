<html lang="en">
  <head>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stacys40th.netlify.app/" />
    <meta property="og:title" content="Stacy's 40th Fiesta | Margs & Milestones Weekend" />
    <meta property="og:description" content="Join us for Stacy's 40th birthday celebration in Rocky Point, Mexico. Spring 2026. Denim & diamonds, margaritas, and sunset cruises await!" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/vaquero.svg" />
    
    <!-- Fonts - Old Mexican Rodeo Theme with Preloading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Font Preloading for Performance (Display fonts: Rye, Rancho; Body: Urbanist) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rye&family=Urbanist:wght@400;500;600;700&family=Rancho&display=swap&subset=latin" />
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Urbanist:wght@400;500;600;700&family=Rancho&display=swap&subset=latin" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Hidden forms for Netlify Forms detection (must be in static HTML) -->
    
    <!-- Memories Form -->
    <form name="memories" netlify netlify-honeypot="website" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="file" name="photo" />
      <input type="text" name="website" />
    </form>
    
    <!-- RSVP Form -->
    <form name="rsvp" netlify netlify-honeypot="_catch" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="number" name="partySize" />
      <input type="text" name="_catch" />
    </form>
    
    <!-- Carpool Form -->
    <form name="carpool" netlify hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="role" />
      <input type="number" name="seats" />
      <input type="text" name="location" />
      <textarea name="notes"></textarea>
    </form>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix" values="
        0.8 0   0   0   0.86
        0   0.78 0   0   0.82
        0   0   0.7 0   0.74
        0   0   0   1   0" />
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="80%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.06)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="#ECE2CD"/>
  <rect width="1200" height="1200" filter="url(#paper)" opacity=".5"/>
  <rect width="1200" height="1200" fill="url(#vignette)"/>
</svg>

